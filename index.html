<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="description" content="Real-time face recognition from your phone">
  <link rel="stylesheet" href="css/camera.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Face2R</title>
</head>
<body>

  <!-- ========== PIN Screen ========== -->
  <div id="pin-screen">
    <div class="pin-title">Face2R</div>
    <input
      type="password"
      class="pin-input"
      maxlength="6"
      inputmode="numeric"
      pattern="[0-9]*"
      placeholder="------"
      autocomplete="off"
    >
    <button class="pin-submit" type="button">Unlock</button>
    <div class="pin-error"></div>
  </div>

  <!-- ========== Loading Screen ========== -->
  <div id="loading-screen" style="display:none">
    <div class="loading-bar-track">
      <div class="loading-bar-fill"></div>
    </div>
    <div class="loading-status">Loading models...</div>
  </div>

  <!-- ========== Camera ========== -->
  <div id="camera-container">
    <video id="camera-video" autoplay playsinline muted></video>
    <div id="face-overlay" style="display:none"></div>
  </div>

  <!-- ========== Status Bar (top) ========== -->
  <div id="status-bar" style="display:none">
    <div class="status-left">
      <span class="sync-dot"></span>
      <span class="status-title">Face2R &mdash; Live</span>
    </div>
    <div class="status-center">
      <span id="person-count">0 persons</span>
    </div>
    <div class="status-right">
      <span id="sync-status">Synced</span>
    </div>
  </div>

  <!-- ========== Toolbar (bottom) ========== -->
  <div id="toolbar" style="display:none">
    <button class="toolbar-btn" id="btn-switch-camera" type="button" aria-label="Switch camera">&#x21BB;</button>
    <button class="capture-btn" id="btn-capture" type="button" aria-label="Capture"></button>
    <button class="toolbar-btn" id="btn-admin" type="button" aria-label="Admin">&#x2699;</button>
  </div>

  <!-- ========== Low-Light Warning ========== -->
  <div id="low-light-warning" style="display:none">
    Low light detected &mdash; recognition may be less accurate
  </div>

  <!-- ========== Add Person Modal ========== -->
  <div id="add-person-modal" class="modal-overlay">
    <div class="modal-sheet">
      <button class="modal-close" type="button" aria-label="Close">&times;</button>

      <div class="captured-face-preview">
        <canvas id="captured-face" width="80" height="80"></canvas>
      </div>

      <input
        type="text"
        id="input-person-name"
        placeholder="Enter name"
        required
        autocomplete="off"
      >

      <textarea
        id="input-person-notes"
        placeholder="Notes (optional)"
      ></textarea>

      <div class="risk-selector">
        <button class="risk-btn" data-risk="green" type="button">LOW</button>
        <button class="risk-btn selected" data-risk="neutral" type="button">NEUTRAL</button>
        <button class="risk-btn" data-risk="red" type="button">RISK</button>
      </div>

      <button class="btn-save" id="btn-save-person" type="button" disabled>Save Person</button>

      <div class="confidence-notice" id="confidence-notice"></div>
    </div>
  </div>

  <!-- ========== Known-Face Quick Panel ========== -->
  <div id="known-face-panel">
    <div class="qp-header">
      <span class="qp-name" id="qp-name"></span>
      <span class="qp-badge" id="qp-badge"></span>
      <span class="qp-match" id="qp-match"></span>
    </div>
    <div class="qp-notes" id="qp-notes"></div>
    <div class="confidence-bar">
      <div class="confidence-bar-fill" id="qp-confidence-fill"></div>
    </div>
    <div class="confidence-percentage" id="qp-confidence-pct"></div>
    <div class="confidence-recommendation" id="qp-confidence-rec"></div>
    <div class="qp-actions">
      <button id="qp-add-photo" type="button">+ Photo</button>
      <button id="qp-edit-risk" type="button">Risk</button>
      <button id="qp-close" type="button">Close</button>
    </div>
  </div>

  <!-- ========== Toast ========== -->
  <div id="toast"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
